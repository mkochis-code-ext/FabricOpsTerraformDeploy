# Reusable template that emits a single stage for a workspace environment:
#   Deploy - runs these jobs in order:
#     1. terraform plan of the workspace root
#     2. a manual-approval gate, only when the plan reports changes
#     3. terraform apply (skipped automatically when the plan reports no changes)
#     4. the Fabric content deploy, by mode:
#          git-sync        : Update From Git (ADO -> Dev workspace)
#          pipeline-deploy : apply the deployment pipeline, then promote
#                            content between stages via the Deploy API
#          none            : no content deploy
#
# Each environment is wired through this template from azure-pipelines.yml.

parameters:
  - name: environment        # Logical name: dev | nonprod | prod
    type: string
  - name: workingDirectory   # Path to the workspace Terraform root for this environment
    type: string
  - name: serviceConnection  # Azure DevOps service connection (Workload Identity Federation)
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainerName
    type: string
  - name: backendKey         # Backend state key for the workspace root
    type: string
  - name: fabricDeployMode   # none | git-sync | pipeline-deploy
    type: string
    default: 'none'
  - name: terraformVars      # Extra -var flags appended to the workspace root's `terraform plan`
    type: string
    default: ''
  # --- pipeline-deploy mode only ---
  - name: pipelineWorkingDirectory  # Path to the deployment_pipeline Terraform root
    type: string
    default: '$(Build.SourcesDirectory)/Terraform/deployment_pipeline'
  - name: pipelineBackendKey        # Backend state key for the deployment pipeline root
    type: string
    default: 'fabric/deployment-pipeline.tfstate'
  - name: activeEnvironments        # HCL list passed to -var, e.g. '["dev","nonprod"]'
    type: string
    default: '[]'
  - name: sourceStage               # Source stage display name for the promotion
    type: string
    default: ''
  - name: targetStage               # Target stage display name for the promotion
    type: string
    default: ''
  # --- approval gate ---
  - name: requireApproval           # Pause for manual approval before apply when the plan has changes
    type: boolean
    default: true
  - name: approvalNotifyUsers       # Optional list of users/groups to notify for the approval
    type: string
    default: ''
  - name: dependsOn
    type: object
    default: []

stages:
  # -------------------------------------------------------------------------
  # Deploy (plan + conditional approval + apply + fabric deploy)
  #
  #   1. terraform_plan   - init + `plan -detailed-exitcode`. Sets the output
  #                         variable hasChanges (true/false). When there are no
  #                         changes it also captures the current workspace_id from
  #                         state, because the apply job (which normally publishes it)
  #                         is skipped.
  #   2. wait_for_approval - agentless ManualValidation job that pauses for approval,
  #                          but ONLY when the plan reported changes and requireApproval
  #                          is true. Skipped entirely when there is nothing to apply.
  #   3. terraform_apply  - applies the saved plan, but only when the plan reported
  #                         changes and the approval succeeded (or was not required).
  #   4. fabric_deploy    - content deploy (git-sync or pipeline-deploy). Runs when the
  #                         plan succeeded and the apply either succeeded or was skipped
  #                         (no changes); skipped if the approval was rejected.
  #
  # When the plan reports no changes, both the approval and apply are skipped and the
  # stage proceeds straight to the fabric deploy.
  # -------------------------------------------------------------------------
  - stage: Deploy_${{ parameters.environment }}
    displayName: 'Deploy - ${{ parameters.environment }}'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: terraform_plan
        displayName: 'Terraform Plan'
        steps:
          - task: AzureCLI@2
            name: plan
            displayName: 'Terraform Init & Plan'
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              workingDirectory: ${{ parameters.workingDirectory }}
              inlineScript: |
                set -euo pipefail

                # Surface the federated credentials to both Terraform's azurerm backend
                # and the Fabric provider (OIDC).
                export ARM_TENANT_ID="$tenantId"
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_OIDC_TOKEN="$idToken"
                export ARM_USE_OIDC=true
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                export FABRIC_TENANT_ID="$tenantId"
                export FABRIC_CLIENT_ID="$servicePrincipalId"
                export FABRIC_OIDC_TOKEN="$idToken"
                export FABRIC_USE_OIDC=true

                # Run Terraform through the official container image instead of a locally
                # installed binary (the TerraformInstaller marketplace task is restricted).
                # The whole repo is mounted so relative module sources (../../modules) resolve;
                # docker is preinstalled on the agent and OIDC env vars are forwarded with -e.
                TF_IMAGE="hashicorp/terraform:$(TF_VERSION)"
                REPO_ROOT="$(Build.SourcesDirectory)"
                terraform() {
                  docker run --rm \
                    -e ARM_TENANT_ID -e ARM_CLIENT_ID -e ARM_OIDC_TOKEN -e ARM_USE_OIDC -e ARM_SUBSCRIPTION_ID \
                    -e FABRIC_TENANT_ID -e FABRIC_CLIENT_ID -e FABRIC_OIDC_TOKEN -e FABRIC_USE_OIDC \
                    -v "$REPO_ROOT:/repo" -w "/repo/${PWD#$REPO_ROOT/}" \
                    "$TF_IMAGE" "$@"
                }

                terraform init -input=false \
                  -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
                  -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
                  -backend-config="container_name=${{ parameters.backendContainerName }}" \
                  -backend-config="key=${{ parameters.backendKey }}"

                # `-detailed-exitcode`: 0 = no changes, 1 = error, 2 = changes present.
                set +e
                terraform plan -input=false -detailed-exitcode -out=tfplan \
                  -var="tenant_id=$tenantId" \
                  -var="client_id=$servicePrincipalId" \
                  -var="use_oidc=true" \
                  ${{ parameters.terraformVars }}
                planExitCode=$?
                set -e

                if [ "$planExitCode" -eq 0 ]; then
                  echo 'No infrastructure changes detected; apply will be skipped.'
                  echo "##vso[task.setvariable variable=hasChanges;isOutput=true]false"
                  # Apply is skipped, so capture the existing workspace_id from state here
                  # for the FabricDeploy stage.
                  terraform output -raw workspace_id > "$(Build.ArtifactStagingDirectory)/workspace_id.txt"
                elif [ "$planExitCode" -eq 2 ]; then
                  echo 'Infrastructure changes detected; apply is required.'
                  echo "##vso[task.setvariable variable=hasChanges;isOutput=true]true"
                else
                  echo "terraform plan failed with exit code $planExitCode."
                  exit "$planExitCode"
                fi

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan'
            inputs:
              targetPath: ${{ parameters.workingDirectory }}
              artifact: 'tfplan-${{ parameters.environment }}'

          # Only published on the no-change path; on the change path the apply job
          # publishes the authoritative workspace_id after applying.
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Workspace Id (no-change path)'
            condition: eq(variables['plan.hasChanges'], 'false')
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/workspace_id.txt'
              artifact: 'tfoutput-${{ parameters.environment }}'

      # ---------------------------------------------------------------------
      # Conditional manual approval — only runs when the plan reported changes.
      # ---------------------------------------------------------------------
      - job: wait_for_approval
        displayName: 'Approve Apply'
        dependsOn: terraform_plan
        condition: and(succeeded(), eq(dependencies.terraform_plan.outputs['plan.hasChanges'], 'true'), eq('${{ parameters.requireApproval }}', 'true'))
        pool: server
        timeoutInMinutes: 4320   # 3 days for the stage to await approval
        steps:
          - task: ManualValidation@0
            displayName: 'Approve Terraform Apply - ${{ parameters.environment }}'
            timeoutInMinutes: 1440   # auto-reject after 1 day of no response
            inputs:
              notifyUsers: ${{ parameters.approvalNotifyUsers }}
              instructions: 'Terraform detected changes for the ${{ parameters.environment }} workspace. Review the plan, then approve to apply or reject to cancel.'
              onTimeout: 'reject'

      # ---------------------------------------------------------------------
      # Apply — only runs when the plan reported changes and the approval either
      # succeeded or was not required (wait_for_approval skipped).
      # ---------------------------------------------------------------------
      - deployment: terraform_apply
        displayName: 'Terraform Apply'
        dependsOn:
          - terraform_plan
          - wait_for_approval
        condition: and(eq(dependencies.terraform_plan.outputs['plan.hasChanges'], 'true'), in(dependencies.wait_for_approval.result, 'Succeeded', 'Skipped'))
        environment: 'fabric-${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: 'tfplan-${{ parameters.environment }}'

                - task: AzureCLI@2
                  displayName: 'Terraform Apply'
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnection }}
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    workingDirectory: ${{ parameters.workingDirectory }}
                    inlineScript: |
                      set -euo pipefail

                      export ARM_TENANT_ID="$tenantId"
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_OIDC_TOKEN="$idToken"
                      export ARM_USE_OIDC=true
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                      export FABRIC_TENANT_ID="$tenantId"
                      export FABRIC_CLIENT_ID="$servicePrincipalId"
                      export FABRIC_OIDC_TOKEN="$idToken"
                      export FABRIC_USE_OIDC=true

                      # Run Terraform through the official container image (see Plan job).
                      TF_IMAGE="hashicorp/terraform:$(TF_VERSION)"
                      REPO_ROOT="$(Build.SourcesDirectory)"
                      terraform() {
                        docker run --rm \
                          -e ARM_TENANT_ID -e ARM_CLIENT_ID -e ARM_OIDC_TOKEN -e ARM_USE_OIDC -e ARM_SUBSCRIPTION_ID \
                          -e FABRIC_TENANT_ID -e FABRIC_CLIENT_ID -e FABRIC_OIDC_TOKEN -e FABRIC_USE_OIDC \
                          -v "$REPO_ROOT:/repo" -w "/repo/${PWD#$REPO_ROOT/}" \
                          "$TF_IMAGE" "$@"
                      }

                      terraform init -input=false \
                        -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
                        -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
                        -backend-config="container_name=${{ parameters.backendContainerName }}" \
                        -backend-config="key=${{ parameters.backendKey }}"

                      # Copy the plan artifact next to the working directory and apply it.
                      cp "$(Pipeline.Workspace)/tfplan-${{ parameters.environment }}/tfplan" ./tfplan
                      terraform apply -input=false -auto-approve tfplan

                      # Persist the workspace ID for the fabric-deploy stage.
                      terraform output -raw workspace_id > "$(Build.ArtifactStagingDirectory)/workspace_id.txt"

                - task: PublishPipelineArtifact@1
                  displayName: 'Publish Terraform Outputs'
                  inputs:
                    targetPath: '$(Build.ArtifactStagingDirectory)/workspace_id.txt'
                    artifact: 'tfoutput-${{ parameters.environment }}'

      # ---------------------------------------------------------------------
      # Fabric Deploy (final jobs in this stage)
      #   git-sync        : pull the latest ADO commit into the Dev workspace
      #   pipeline-deploy : apply the deployment pipeline (wiring active stages),
      #                     then promote content from sourceStage -> targetStage
      # Runs after the infra jobs when the plan succeeded and the apply either
      # succeeded or was skipped (no changes). Skipped if the approval was rejected
      # or the plan failed.
      # ---------------------------------------------------------------------
      - ${{ if ne(parameters.fabricDeployMode, 'none') }}:
        - deployment: fabric_deploy
          displayName: 'Fabric Deploy'
          dependsOn:
            - terraform_plan
            - wait_for_approval
            - terraform_apply
          condition: and(eq(dependencies.terraform_plan.result, 'Succeeded'), in(dependencies.wait_for_approval.result, 'Succeeded', 'Skipped'), in(dependencies.terraform_apply.result, 'Succeeded', 'Skipped'))
          environment: 'fabric-${{ parameters.environment }}'
          strategy:
            runOnce:
              deploy:
                steps:
                  - checkout: self

                  - download: current
                    artifact: 'tfoutput-${{ parameters.environment }}'

                  # ---------------------- git-sync (Dev) ----------------------
                  - ${{ if eq(parameters.fabricDeployMode, 'git-sync') }}:
                    - task: AzureCLI@2
                      displayName: 'Update Workspace From Git'
                      inputs:
                        azureSubscription: ${{ parameters.serviceConnection }}
                        scriptType: 'pscore'
                        scriptLocation: 'inlineScript'
                        inlineScript: |
                          $ErrorActionPreference = 'Stop'
                          $env:FABRIC_WORKSPACE_ID = (Get-Content "$(Pipeline.Workspace)/tfoutput-${{ parameters.environment }}/workspace_id.txt" -Raw).Trim()
                          $env:FABRIC_TOKEN = az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv
                          ./scripts/Invoke-FabricGitSync.ps1

                  # ------------- pipeline-deploy (Non-Prod / Prod) ------------
                  - ${{ if eq(parameters.fabricDeployMode, 'pipeline-deploy') }}:
                    - task: AzureCLI@2
                      displayName: 'Apply Deployment Pipeline'
                      inputs:
                        azureSubscription: ${{ parameters.serviceConnection }}
                        scriptType: 'bash'
                        scriptLocation: 'inlineScript'
                        addSpnToEnvironment: true
                        workingDirectory: ${{ parameters.pipelineWorkingDirectory }}
                        inlineScript: |
                          set -euo pipefail

                          export ARM_TENANT_ID="$tenantId"
                          export ARM_CLIENT_ID="$servicePrincipalId"
                          export ARM_OIDC_TOKEN="$idToken"
                          export ARM_USE_OIDC=true
                          export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                          export FABRIC_TENANT_ID="$tenantId"
                          export FABRIC_CLIENT_ID="$servicePrincipalId"
                          export FABRIC_OIDC_TOKEN="$idToken"
                          export FABRIC_USE_OIDC=true

                          # Run Terraform through the official container image (see Plan stage).
                          TF_IMAGE="hashicorp/terraform:$(TF_VERSION)"
                          REPO_ROOT="$(Build.SourcesDirectory)"
                          terraform() {
                            docker run --rm \
                              -e ARM_TENANT_ID -e ARM_CLIENT_ID -e ARM_OIDC_TOKEN -e ARM_USE_OIDC -e ARM_SUBSCRIPTION_ID \
                              -e FABRIC_TENANT_ID -e FABRIC_CLIENT_ID -e FABRIC_OIDC_TOKEN -e FABRIC_USE_OIDC \
                              -v "$REPO_ROOT:/repo" -w "/repo/${PWD#$REPO_ROOT/}" \
                              "$TF_IMAGE" "$@"
                          }

                          terraform init -input=false \
                            -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
                            -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
                            -backend-config="container_name=${{ parameters.backendContainerName }}" \
                            -backend-config="key=${{ parameters.pipelineBackendKey }}"

                          terraform apply -input=false -auto-approve \
                            -var="tenant_id=$tenantId" \
                            -var="client_id=$servicePrincipalId" \
                            -var="use_oidc=true" \
                            -var="admin_group_id=$(admin_security_group_id)" \
                            -var="backend_resource_group_name=${{ parameters.backendResourceGroup }}" \
                            -var="backend_storage_account_name=${{ parameters.backendStorageAccount }}" \
                            -var="backend_container_name=${{ parameters.backendContainerName }}" \
                            -var='active_environments=${{ parameters.activeEnvironments }}'

                          terraform output -raw deployment_pipeline_id > "$(Build.ArtifactStagingDirectory)/pipeline_id.txt"
                          terraform output -json deployment_pipeline_stages > "$(Build.ArtifactStagingDirectory)/stages.json"

                    - task: AzureCLI@2
                      displayName: 'Promote ${{ parameters.sourceStage }} -> ${{ parameters.targetStage }}'
                      inputs:
                        azureSubscription: ${{ parameters.serviceConnection }}
                        scriptType: 'pscore'
                        scriptLocation: 'inlineScript'
                        inlineScript: |
                          $ErrorActionPreference = 'Stop'
                          $env:FABRIC_PIPELINE_ID = (Get-Content "$(Build.ArtifactStagingDirectory)/pipeline_id.txt" -Raw).Trim()
                          $env:FABRIC_STAGES_JSON = Get-Content "$(Build.ArtifactStagingDirectory)/stages.json" -Raw
                          $env:FABRIC_SOURCE_STAGE = '${{ parameters.sourceStage }}'
                          $env:FABRIC_TARGET_STAGE = '${{ parameters.targetStage }}'
                          $env:FABRIC_TOKEN = az account get-access-token --resource https://api.fabric.microsoft.com --query accessToken -o tsv
                          ./scripts/Invoke-FabricDeployStage.ps1
